<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<body>
    <form id="userform">
        <div class="form_group">
            <label for="name">Имя</label>
            <input type="text" id="name" name="name" placeholder="Ivan" required>
        </div>
        <div class="form_group">
            <label for="surname">Фамилия</label>
            <input type="text" id="surname" name="surname" placeholder="Ivanov" required>
        </div>
        <div class="form_group">
            <label for="dateOfBirth">Дата рождения</label>
            <input type="date" id="dateOfBirth" name="dateOfBirth" required>
        </div>

        <div class="form-group">
                <label>Пол</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="gender" value="male" required>
                        Мужской
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="gender" value="female">
                        Женский
                    </label>
                </div>
            </div>

            <button type="submit">Отправить</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('userform').addEventListener('submit', async function send(e) {
            e.preventDefault();

            const formData = new FormData(e.target);

            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('http://localhost:8001/users/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // 3. Показываем результат
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                if (response.ok) {
                    resultDiv.style.background = '#d4edda';
                    resultDiv.style.color = '#155724';
                    resultDiv.textContent = '✅ Успешно! Ответ сервера: ' + JSON.stringify(result);
                } else {
                    resultDiv.style.background = '#f8d7da';
                    resultDiv.style.color = '#721c24';
                    resultDiv.textContent = '❌ Ошибка: ' + JSON.stringify(result);
                }

            } catch (error) {
                console.error('Error:', error);
                alert('Не удалось подключиться к серверу. Проверь, запущен ли FastAPI.');
            }
        })
    </script>
</body>
</html>
